<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    .active-tab {
      background: #4F46E5;
      color: white;
    }
  
    .open-border {
      border-top: 4px solid #10B981;
    }
  
    .closed-border {
      border-top: 4px solid #8B5CF6;
    }
  </style>

  </head>
  
  <body class="bg-gray-50 font-sans">

    <!-- LOGIN -->
    
    <div id="login-section" class="min-h-screen flex items-center justify-center bg-gray-50">
    
      <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    
        <div class="text-center mb-6">
    
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-16 mx-auto mb-3">
    
          <h1 class="text-2xl font-bold text-gray-800">
            GitHub Issues Tracker
          </h1>
    
          <p class="text-gray-500 text-sm">
            Sign in to manage your issues
          </p>
    
        </div>
    
    
        <div class="mb-4">
          <label class="text-sm font-semibold text-gray-700">
            Username
          </label>
    
          <input id="username" type="text" placeholder="Enter Username"
            class="w-full border border-gray-200 p-3 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-400">
    
          <p class="text-indigo-600 text-xs mt-1">
            Default: admin
          </p>
        </div>
    
    
        <div class="mb-6">
          <label class="text-sm font-semibold text-gray-700">
            Password
          </label>
    
          <input id="password" type="password" placeholder="Enter Password"
            class="w-full border border-gray-200 p-3 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-indigo-400">
    
          <p class="text-indigo-600 text-xs mt-1">
            Default: admin123
          </p>
        </div>
    
    
        <button onclick="handleLogin()" class="w-full py-3 rounded-lg text-white font-semibold
            bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 transition">
          Sign In
        </button>
    
    
        <div class="flex items-center my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="px-3 text-gray-400 text-sm">OR</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>
    
    
        <p class="text-center text-gray-400 text-sm mb-3">
          Demo Credentials:
        </p>
    
    
        <div class="bg-gray-100 rounded-lg p-4 text-center text-sm">
    
          <p>
            <span class="font-semibold">Username:</span> admin
          </p>
    
          <p>
            <span class="font-semibold">Password:</span> admin123
          </p>
    
        </div>
    
      </div>
    
    </div>

    <!-- DASHBOARD -->
    
    <div id="dashboard-section" class="hidden">
    
      <!-- NAVBAR -->
    
      <nav class="bg-white border-b p-4 flex justify-between items-center">
    
        <div class="flex items-center gap-2">
    
          <img src="images/github-logo.png" class="w-6 h-6">
    
          <span class="font-bold text-lg">GitHub Issues Tracker</span>
    
        </div>
    
    
        <div class="flex items-center gap-3">
    
          <div class="relative">
    
            <input id="search-input" type="text" placeholder="Search issues..." class="border px-3 py-2 rounded" />
    
            <button onclick="searchIssues()" class="bg-blue-600 text-white px-4 py-2 rounded ml-2">
              Search
            </button>
    
    
          </div>
    
        </div>
    
      </nav>

      <div class="max-w-7xl mx-auto p-6">
      
      <!-- FILTER -->
      
        <div class="flex gap-3 mb-6">
      
          <button onclick="filterIssues('all')" id="btn-all" class="px-5 py-2 border rounded-lg active-tab">
            All
          </button>
      
          <button onclick="filterIssues('open')" id="btn-open" class="px-5 py-2 border rounded-lg">
            Open
          </button>
      
          <button onclick="filterIssues('closed')" id="btn-closed" class="px-5 py-2 border rounded-lg">
            Closed
          </button>
      
        </div>

        <!-- ISSUE HEADER -->
        
        <div class="flex justify-between items-center mb-6">
        
          <div class="flex items-center gap-3">
        
            <div class="bg-blue-100 p-2 rounded-full">
        
              <img src="images/Aperture.png" class="w-6 h-6">
        
            </div>
        
            <div>
        
              <h2 id="issue-count" class="font-bold text-lg">0 Issues</h2>
        
              <p class="text-gray-500 text-sm">
        
                Track and manage your project issues
        
              </p>
        
            </div>
        
          </div>
        
        
          <div class="flex gap-6 text-sm">
        
            <div class="flex items-center gap-1">
        
              <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        
              Open
        
            </div>
        
            <div class="flex items-center gap-1">
        
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        
              Closed
        
            </div>
        
          </div>
        
        </div>

        <!-- LOADER -->
        
        <div id="loader" class="hidden text-center py-10">
        
          Loading...
        
        </div>
        
        <!-- ISSUES GRID -->
        
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        
        </div>
        
        </div>
        
        </div>
        
         <!-- MODAL -->
        
        <div id="issue-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center hidden z-50">
          <div id="modal-content"></div>
        </div>

<script src="script.js"></script>

</body>
    
</html>
